name: "OpenIPC Bridge"
version: "1.1.1"
slug: openipc_bridge
description: "OpenIPC Bridge with built-in TTS generators and web configuration UI"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: application
boot: auto
host_network: true
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "API and Web UI port"
webui: "http://[HOST]:[PORT:5000]/config"  # Ссылка на веб-интерфейс
options: {}
schema: {}
init: false
hassio_api: true
hassio_role: default
homeassistant_api: true
map:
  - config:rw